server:
  port: ${PORT:8080}

spring:
  application:
    name: inventario-civil-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventario_civil}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    repair-on-migrate: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: America/La_Paz

app:
  jwt:
    secret: ${JWT_SECRET:inventarioCivilSecretKey2025UCBFullStackMireya}
    expiration-ms: 86400000       # 24 horas
    refresh-expiration-ms: 604800000  # 7 días

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
